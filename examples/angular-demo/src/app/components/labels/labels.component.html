<div class="p-4 sm:p-6 md:p-8 max-w-7xl mx-auto animate-in fade-in duration-500">
  <!-- Header Section -->
  <div class="flex flex-col md:flex-row justify-between items-stretch md:items-center gap-4 mb-8">
      <div>
          <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Label Templates</h1>
          <p class="text-gray-500 mt-1">Design and manage your QR code layouts</p>
      </div>
      <button
          (click)="handleCreateNew()"
          class="w-full md:w-auto flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-medium transition-all shadow-sm hover:shadow-md active:scale-95 cursor-pointer"
      >
          <lucide-icon [img]="PlusIcon" [size]="20"></lucide-icon>
          <span>Create New Label</span>
      </button>
  </div>

  <!-- Content Table -->
  <app-table
      [data]="labels"
      [columns]="columns"
      keyField="id"
      (edit)="handleEdit($event)"
      (delete)="handleDelete($event)"
  >
      <ng-template #cellTemplate let-item let-column="column">
          <div *ngIf="column.id === 'name'" class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-red-100 flex items-center justify-center text-red-600">
                  <lucide-icon [img]="LayoutIcon" [size]="20"></lucide-icon>
              </div>
              <div class="font-semibold text-gray-900">{{ item.name }}</div>
          </div>
          <span *ngIf="column.id === 'targetEntity'" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-700 capitalize border border-gray-200">
              <lucide-icon [img]="SmartphoneIcon" [size]="12"></lucide-icon>
              {{ item.targetEntity || "None" }}
          </span>
          <span *ngIf="column.id === 'dimensions'" class="text-gray-600 text-sm font-mono">
              {{ item.width }}{{ item.unit }} × {{ item.height }}{{ item.unit }}
          </span>
          <span *ngIf="column.id === 'elements'" class="bg-gray-50 px-2 py-1 rounded border border-gray-100 text-sm text-gray-600">
              {{ item.elements.length }} items
          </span>
      </ng-template>
  </app-table>
</div>
