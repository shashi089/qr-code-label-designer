name: Create GitHub Releases

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create releases for new versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags

          packages=(
            "qrlayout-core:packages/core"
            "qrlayout-ui:packages/ui"
            "react-qr-label:packages/react-qr-label"
            "vue-qr-label:packages/vue-qr-label"
            "svelte-qr-label:packages/svelte-qr-label"
          )

          for entry in "${packages[@]}"; do
            name="${entry%%:*}"
            path="${entry##*:}"
            version=$(node -p "require('./$path/package.json').version")
            tag="$name@$version"

            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "$tag already exists — skipping"
            else
              echo "Creating release $tag..."
              gh release create "$tag" \
                --title "$name v$version" \
                --notes "## $name v$version

Install:
\`\`\`bash
npm install $name
\`\`\`" \
                --latest=false
              echo "$tag released"
            fi
          done
